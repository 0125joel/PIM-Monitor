trigger: none

schedules:
  - cron: "0 */6 * * *"
    displayName: "PIM Change Scan (4x daily)"
    branches:
      include: [main]
    always: true

pool:
  vmImage: "ubuntu-latest"

variables:
  MSGRAPH_VERSION: "2.35.1"

steps:
  - checkout: self
    persistCredentials: true
    displayName: "Checkout repository"

  - script: |
      git remote add upstream https://github.com/0125joel/PIM-Monitor.git
      git fetch upstream main --quiet 2>/dev/null
      AHEAD=$(git rev-list HEAD..upstream/main --count 2>/dev/null || echo 0)
      git remote remove upstream
      if [ "$AHEAD" -gt 0 ]; then
        echo "##[warning]PIM Monitor: $AHEAD upstream commit(s) available on GitHub (https://github.com/0125joel/PIM-Monitor). Review and update your local copy."
        echo "##vso[task.setvariable variable=UPSTREAM_COMMITS_AHEAD]$AHEAD"
        echo "##vso[task.setvariable variable=UPSTREAM_UPDATE_AVAILABLE]true"
      else
        echo "##vso[task.setvariable variable=UPSTREAM_UPDATE_AVAILABLE]false"
      fi
    displayName: "Check for upstream updates on GitHub"
    continueOnError: true

  - task: PowerShell@2
    name: cacheVars
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $p = $env:PSModulePath.Split([IO.Path]::PathSeparator) |
             Where-Object { $_ -match 'home|user' } |
             Select-Object -First 1
        "##vso[task.setvariable variable=psUserModulePath]$p" | Write-Host
        Write-Host "User module path: $p"
    displayName: "Detect user module path"

  - task: Cache@2
    inputs:
      key: '"MSGraph" | "$(MSGRAPH_VERSION)" | "$(Agent.OS)"'
      path: "$(psUserModulePath)"
      cacheHitVar: MODULES_CACHE_HIT
    displayName: "Restore Microsoft.Graph module cache"

  - task: PowerShell@2
    condition: ne(variables['MODULES_CACHE_HIT'], 'true')
    inputs:
      targetType: inline
      pwsh: true
      script: |
        Write-Host "Installing Microsoft.Graph $(MSGRAPH_VERSION)..."
        Install-Module -Name Microsoft.Graph -RequiredVersion "$(MSGRAPH_VERSION)" `
          -Scope CurrentUser -Force -SkipPublisherCheck -Repository PSGallery
        Write-Host "Module installed successfully"
    displayName: "Install Microsoft.Graph module"

  - task: AzurePowerShell@5
    inputs:
      azureSubscription: "pim-monitor-service-connection"
      ScriptType: "FilePath"
      ScriptPath: "$(Build.SourcesDirectory)/src/Scan-PimState.ps1"
      azurePowerShellVersion: "LatestVersion"
      pwsh: true
    displayName: "Run PIM change scan"
    env:
      NOTIFICATION_EMAIL: $(NOTIFICATION_EMAIL)
      NOTIFICATION_MAIL_FROM: $(NOTIFICATION_MAIL_FROM)
      NOTIFICATION_WEBHOOK_URL: $(NOTIFICATION_WEBHOOK_URL)
      NOTIFICATION_MIN_SEVERITY: $(NOTIFICATION_MIN_SEVERITY)
      REPORT_ARTIFACT: $(REPORT_ARTIFACT)
      EXPIRING_WINDOW_DAYS: $(EXPIRING_WINDOW_DAYS)

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: "$(Build.ArtifactStagingDirectory)"
      artifact: "scan-report"
    displayName: "Publish HTML scan report"
    condition: eq(variables['REPORT_ARTIFACT'], 'true')

  - task: AzurePowerShell@5
    displayName: "Notify upstream update available"
    condition: and(always(), eq(variables['UPSTREAM_UPDATE_AVAILABLE'], 'true'), ne(variables['NOTIFY_UPSTREAM_UPDATE'], 'false'))
    inputs:
      azureSubscription: "pim-monitor-service-connection"
      ScriptType: "FilePath"
      ScriptPath: "$(Build.SourcesDirectory)/src/Send-UpstreamUpdate.ps1"
      azurePowerShellVersion: "LatestVersion"
      pwsh: true
    env:
      NOTIFICATION_EMAIL: $(NOTIFICATION_EMAIL)
      NOTIFICATION_MAIL_FROM: $(NOTIFICATION_MAIL_FROM)
      NOTIFICATION_WEBHOOK_URL: $(NOTIFICATION_WEBHOOK_URL)
      UPSTREAM_COMMITS_AHEAD: $(UPSTREAM_COMMITS_AHEAD)
