trigger: none

schedules:
  - cron: "0 */6 * * *"
    displayName: "PIM Change Scan (4x daily)"
    branches:
      include: [main]
    always: true
    batch: true

jobs:
  - job: scan
    timeoutInMinutes: 30
    pool:
      vmImage: "ubuntu-latest"
    steps:
      - checkout: self
        persistCredentials: true
        # Full history: the concurrent-push recovery (fetch + rebase in git.ps1) needs a
        # merge-base, which a shallow clone may not contain.
        fetchDepth: 0
        displayName: "Checkout repository"

      - script: |
          LATEST_TAG=$(curl -sf --max-time 10 \
            "https://api.github.com/repos/0125joel/PIM-Monitor/releases/latest" \
            | jq -r '.tag_name // empty' 2>/dev/null || echo "")
          LATEST_VERSION="${LATEST_TAG#v}"
          CURRENT_VERSION=$(grep -oP '\d+\.\d+\.\d+' "$(Build.SourcesDirectory)/VERSION" | head -1)

          if [ -z "$LATEST_VERSION" ] || [ -z "$CURRENT_VERSION" ]; then
            echo "##[warning]Could not determine version for upstream check"
            echo "##vso[task.setvariable variable=UPSTREAM_UPDATE_AVAILABLE]false"
          elif [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] && \
               [ "$(printf '%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | sort -V | head -1)" = "$CURRENT_VERSION" ]; then
            echo "##[warning]PIM Monitor $LATEST_VERSION is available (running $CURRENT_VERSION). See https://github.com/0125joel/PIM-Monitor/releases/tag/v$LATEST_VERSION"
            echo "##vso[task.setvariable variable=UPSTREAM_LATEST_VERSION]$LATEST_VERSION"
            echo "##vso[task.setvariable variable=UPSTREAM_CURRENT_VERSION]$CURRENT_VERSION"
            echo "##vso[task.setvariable variable=UPSTREAM_UPDATE_AVAILABLE]true"
          else
            echo "No upstream update available (running $CURRENT_VERSION, latest $LATEST_VERSION)"
            echo "##vso[task.setvariable variable=UPSTREAM_UPDATE_AVAILABLE]false"
          fi
        displayName: "Check for upstream version updates"
        continueOnError: true

      - task: AzurePowerShell@5
        inputs:
          azureSubscription: "pim-monitor-service-connection"
          ScriptType: "FilePath"
          ScriptPath: "$(Build.SourcesDirectory)/src/Scan-PimState.ps1"
          azurePowerShellVersion: "LatestVersion"
          pwsh: true
        displayName: "Run PIM change scan"
        env:
          NOTIFICATION_EMAIL: $(NOTIFICATION_EMAIL)
          NOTIFICATION_MAIL_FROM: $(NOTIFICATION_MAIL_FROM)
          NOTIFICATION_WEBHOOK_URL: $(NOTIFICATION_WEBHOOK_URL)
          NOTIFICATION_WEBHOOK_TYPE: $(NOTIFICATION_WEBHOOK_TYPE)
          NOTIFICATION_MIN_SEVERITY: $(NOTIFICATION_MIN_SEVERITY)
          REPORT_ARTIFACT: $(REPORT_ARTIFACT)
          EXPIRING_WINDOW_DAYS: $(EXPIRING_WINDOW_DAYS)
          EAM_COVERAGE_SCOPE: $(EAM_COVERAGE_SCOPE)
          NOTIFICATION_TEAMS_MENTION: $(NOTIFICATION_TEAMS_MENTION)
          FAIL_ON_COMPONENT_ERROR: $(FAIL_ON_COMPONENT_ERROR)

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: "$(Build.ArtifactStagingDirectory)"
          artifact: "scan-report"
        displayName: "Publish HTML scan report"
        condition: eq(variables['REPORT_ARTIFACT'], 'true')

      - task: AzurePowerShell@5
        displayName: "Notify upstream update available"
        condition: and(always(), eq(variables['UPSTREAM_UPDATE_AVAILABLE'], 'true'), ne(variables['NOTIFY_UPSTREAM_UPDATE'], 'false'))
        inputs:
          azureSubscription: "pim-monitor-service-connection"
          ScriptType: "FilePath"
          ScriptPath: "$(Build.SourcesDirectory)/src/Send-UpstreamUpdate.ps1"
          azurePowerShellVersion: "LatestVersion"
          pwsh: true
        env:
          NOTIFICATION_EMAIL: $(NOTIFICATION_EMAIL)
          NOTIFICATION_MAIL_FROM: $(NOTIFICATION_MAIL_FROM)
          NOTIFICATION_WEBHOOK_URL: $(NOTIFICATION_WEBHOOK_URL)
          UPSTREAM_LATEST_VERSION: $(UPSTREAM_LATEST_VERSION)
          UPSTREAM_CURRENT_VERSION: $(UPSTREAM_CURRENT_VERSION)
