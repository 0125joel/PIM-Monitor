name: PIM Monitor Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: pim-monitor-scan
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  MSGRAPH_VERSION: "2.35.1"

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Microsoft.Graph module cache
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: ~/.local/share/powershell/Modules
          key: MSGraph-${{ env.MSGRAPH_VERSION }}-${{ runner.os }}

      - name: Install Microsoft.Graph module
        if: steps.cache-modules.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Install-Module -Name Microsoft.Graph -RequiredVersion "${{ env.MSGRAPH_VERSION }}" `
            -Scope CurrentUser -Force -SkipPublisherCheck -Repository PSGallery

      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Run PIM Monitor scan
        shell: pwsh
        run: ./src/Scan-PimState.ps1
        env:
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          NOTIFICATION_MAIL_FROM: ${{ secrets.NOTIFICATION_MAIL_FROM }}
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          NOTIFICATION_MIN_SEVERITY: ${{ vars.NOTIFICATION_MIN_SEVERITY }}
          EXPIRING_WINDOW_DAYS: ${{ vars.EXPIRING_WINDOW_DAYS }}
          REPORT_ARTIFACT: ${{ vars.REPORT_ARTIFACT }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload scan report
        if: vars.REPORT_ARTIFACT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pim-monitor-report
          path: scan-report.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Check for upstream updates
        id: upstream-check
        continue-on-error: true
        run: |
          LATEST_TAG=$(curl -sf --max-time 10 \
            "https://api.github.com/repos/0125joel/PIM-Monitor/releases/latest" \
            | jq -r '.tag_name // empty' 2>/dev/null || echo "")
          LATEST_VERSION="${LATEST_TAG#v}"
          CURRENT_VERSION=$(grep -oP '\d+\.\d+\.\d+' "$GITHUB_WORKSPACE/VERSION" | head -1)

          if [ -n "$LATEST_VERSION" ] && [ -n "$CURRENT_VERSION" ] && \
             [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] && \
             [ "$(printf '%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | sort -V | head -1)" = "$CURRENT_VERSION" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
            echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify upstream update available
        if: steps.upstream-check.outputs.update_available == 'true' && vars.NOTIFY_UPSTREAM_UPDATE != 'false'
        shell: pwsh
        run: ./src/Send-UpstreamUpdate.ps1
        env:
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          NOTIFICATION_MAIL_FROM: ${{ secrets.NOTIFICATION_MAIL_FROM }}
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          UPSTREAM_LATEST_VERSION: ${{ steps.upstream-check.outputs.latest_version }}
          UPSTREAM_CURRENT_VERSION: ${{ steps.upstream-check.outputs.current_version }}
