name: PIM Monitor Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: pim-monitor-scan
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history: the concurrent-push recovery (fetch + rebase in git.ps1) needs a
          # merge-base, which the default depth-1 checkout does not contain.
          fetch-depth: 0

      - name: Check for upstream version updates
        id: upstreamcheck
        shell: bash
        continue-on-error: true
        run: |
          LATEST_TAG=$(curl -sf --max-time 10 \
            "https://api.github.com/repos/0125joel/PIM-Monitor/releases/latest" \
            | jq -r '.tag_name // empty' 2>/dev/null || echo "")
          LATEST_VERSION="${LATEST_TAG#v}"
          CURRENT_VERSION=$(grep -oP '\d+\.\d+\.\d+' "VERSION" | head -1)

          if [ -z "$LATEST_VERSION" ] || [ -z "$CURRENT_VERSION" ]; then
            echo "Could not determine version for upstream check"
            echo "update_available=false" >> "$GITHUB_OUTPUT"
          elif [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] && \
               [ "$(printf '%s\n' "$CURRENT_VERSION" "$LATEST_VERSION" | sort -V | head -1)" = "$CURRENT_VERSION" ]; then
            echo "::warning::PIM Monitor $LATEST_VERSION is available (running $CURRENT_VERSION). See https://github.com/0125joel/PIM-Monitor/releases/tag/v$LATEST_VERSION"
            echo "update_available=true" >> "$GITHUB_OUTPUT"
            echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "No upstream update available (running $CURRENT_VERSION, latest $LATEST_VERSION)"
            echo "update_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Run PIM Monitor scan
        shell: pwsh
        run: ./src/Scan-PimState.ps1
        env:
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          NOTIFICATION_MAIL_FROM: ${{ secrets.NOTIFICATION_MAIL_FROM }}
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          NOTIFICATION_WEBHOOK_TYPE: ${{ vars.NOTIFICATION_WEBHOOK_TYPE }}
          NOTIFICATION_MIN_SEVERITY: ${{ vars.NOTIFICATION_MIN_SEVERITY }}
          EXPIRING_WINDOW_DAYS: ${{ vars.EXPIRING_WINDOW_DAYS }}
          EAM_COVERAGE_SCOPE: ${{ vars.EAM_COVERAGE_SCOPE }}
          NOTIFICATION_TEAMS_MENTION: ${{ vars.NOTIFICATION_TEAMS_MENTION }}
          FAIL_ON_COMPONENT_ERROR: ${{ vars.FAIL_ON_COMPONENT_ERROR }}
          REPORT_ARTIFACT: ${{ vars.REPORT_ARTIFACT }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload scan report
        if: vars.REPORT_ARTIFACT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pim-monitor-report
          path: scan-report.html
          if-no-files-found: ignore
          retention-days: 7

      # Runs even if the scan step failed: the upstream-update notice is independent of scan results.
      # Reuses the Az session established by azure/login above (Send-UpstreamUpdate's email path needs it).
      - name: Notify upstream update available
        if: ${{ always() && steps.upstreamcheck.outputs.update_available == 'true' && vars.NOTIFY_UPSTREAM_UPDATE != 'false' }}
        shell: pwsh
        run: ./src/Send-UpstreamUpdate.ps1
        env:
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          NOTIFICATION_MAIL_FROM: ${{ secrets.NOTIFICATION_MAIL_FROM }}
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          UPSTREAM_LATEST_VERSION: ${{ steps.upstreamcheck.outputs.latest_version }}
          UPSTREAM_CURRENT_VERSION: ${{ steps.upstreamcheck.outputs.current_version }}
